<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Remi">
  <defs>
    <filter id="ringBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.8"/>
    </filter>
    <filter id="sphereShadow" x="-50%" y="-40%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="4.5" flood-color="#000" flood-opacity="0.38"/>
    </filter>
  </defs>
  <g filter="url(#sphereShadow)">
    <circle cx="50" cy="50" r="44.5" fill="none" stroke="#2979FF" stroke-width="11" filter="url(#ringBlur)" opacity="0.92"/>
    <circle cx="50" cy="50" r="39" fill="#212121"/>
  </g>
  <g>
    <ellipse cx="37" cy="46" rx="9.5" ry="15" fill="#212121" stroke="#d1d5db" stroke-width="1.8"/>
    <ellipse cx="40" cy="41" rx="3" ry="3.6" fill="#fff"/>
    <circle cx="33" cy="50.5" r="1.6" fill="#fff"/>
    <ellipse cx="63" cy="46" rx="9.5" ry="15" fill="#212121" stroke="#d1d5db" stroke-width="1.8"/>
    <ellipse cx="60" cy="41" rx="3" ry="3.6" fill="#fff"/>
    <circle cx="67" cy="50.5" r="1.6" fill="#fff"/>
  </g>
</svg>
