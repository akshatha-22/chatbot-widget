# Kubernetes example for serving the built Vite widget (SPA).
# Build image first from repo root:
#   docker build -f docker/client.Dockerfile -t chatbot-widget-client:latest .

apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-widget-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot-widget-client
  template:
    metadata:
      labels:
        app: chatbot-widget-client
    spec:
      containers:
        - name: nginx
          image: chatbot-widget-client:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: chatbot-widget-client
spec:
  selector:
    app: chatbot-widget-client
  ports:
    - port: 80
      targetPort: 80
