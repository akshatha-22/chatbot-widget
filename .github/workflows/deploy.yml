name: Deploy

# Frontend only: deploys client/ to Vercel after CI succeeds on main.
# Backend deploys separately on Railway (backend/Dockerfile, railway.toml) via
# Railway GitHub integration or manual deploy — not triggered by this workflow.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy frontend to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        working-directory: client
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Vercel secrets not set — skipping frontend deploy"
            exit 0
          fi
          npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx vercel build --prod --token="$VERCEL_TOKEN"
          npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Deploy summary
        run: |
          {
            echo "## Deploy"
            echo ""
            echo "| Target | Status |"
            echo "|--------|--------|"
            if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
              echo "| Vercel (frontend) | deployed |"
            else
              echo "| Vercel (frontend) | skipped — add Vercel secrets |"
            fi
            echo "| Railway (backend) | not in this workflow — deploy via Railway dashboard or \`railway up\` |"
            echo ""
            echo "### Backend (Railway)"
            echo ""
            echo "- Service root: \`backend/\`"
            echo "- Build: \`backend/Dockerfile\` + \`backend/railway.toml\`"
            echo "- Health check: \`GET /health\`"
            echo "- Set \`VITE_API_URL\` (GitHub secret / Vercel env) to your Railway public HTTPS URL"
            echo "- Required Railway vars: \`DATABASE_URL\`, \`GEMINI_API_KEY\`, \`SECRET_KEY\`, \`CORS_ORIGINS\`"
          } >> "$GITHUB_STEP_SUMMARY"
